<div style="text-align:center">
    <h2 style="font-size:28px;" th:text="${board.title}">apple</h2>
    <p style="margin-top:10px; font-size:18px; color:#666;"
       th:text="${board.content}">
        사과
    </p>
    <div style="margin-top:20px;">
        <button th:onclick="'openModal(\'/board/modify-modal/' + ${board.id} + '\')'">
            수정
        </button>
        <a th:href="@{/board/delete(id=${board.id})}">
            <button style="background:#ff4d4f;">삭제</button>
        </a>
    </div>
</div>
