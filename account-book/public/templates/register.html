<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>가계부 등록</title>
  <link rel="stylesheet" href="../assets/css/common.css">
  <script src="../assets/js/ui.js"></script>
</head>
<body>
  <header class="header">
    <div class="back">
      <button type="button" class="btn back" onclick="location.href='index';"><span class="blind">back</span></button>
    </div>
    <div>지출 등록하기</div>
    <div class="dropdown">
      <button type="button" class="btn btn_dropdown">메뉴</button>
      <ul class="dropdown_menu">
        <li><button type="button" class="btn" onclick="localStorage.removeItem('myToken'); location.href='/';">로그아웃</button></li>
      </ul>
    </div>
  </header>
  <main class="register">
    <form id="registerForm">
      <div class="form_item">
        <label>타입</label>
        <select name="type" id="type_category">
          <option value="expense">지출</option>
          <option value="income">수입</option>
        </select>
      </div>
      <div class="form_item">
        <label>카테고리</label>
        <select name="category" id="item_category">
          <option value="식비">식비</option>
          <option value="카페">카페</option>
          <option value="외식">외식</option>
          <option value="교통">교통</option>
          <option value="생활">생활</option>
          <option value="구독">구독</option>
          <option value="기타">기타</option>
        </select>
      </div>

      <div class="form_item">
        <label>금액</label>
        <input type="number" name="amount" placeholder="금액 입력" id="amount">
      </div>

      <div class="form_item">
        <label>메모</label>
        <input type="text" name="memo" placeholder="내용 입력" id="memo">
      </div>

      <div class="form_item">
        <label>날짜</label>
        <input type="date" name="date" id="date">
      </div>

      <div class="form_button">
        <button type="submit" class="btn submit" onclick="registerAccount(event);">등록</button>
      </div>
    </form>
  </main>
</body>
<script>
  /**
   * 파이프라인
   * 
   * 1. 데이터 로딩
   *   1-1. 등록 : 요청 입력 폼 송출
   *   1-2. 수정 : 기존 입력한 데이터 송출 (상세조 회)
   * 
   * 2. 데이터 수집
   *   2-1. 등록할 데이터 (input value값) 수집
   *   2-2. user_id는 현재 로그인 값도 함께 전송
   * 
   * 3. 데이터 처리
   *   3-1. 데이터 요청 처리 완료 후 index 화면으로 이동
  */


  const loadAccountData = async () => {
    const params = new URLSearchParams(location.search);
    const id = params.get("id");

    if (!id) return; // 등록 페이지면 종료

    const res = await fetch(`/api/account/${id}`, {
      headers: {
        "Authorization": `Bearer ${localStorage.getItem("myToken")}`
      }
    });
    const data = await res.json();

    const item = data.data;
    
    console.log(item);
    if (!item) return;

    const formatDate = (dateStr) => {
      if (!dateStr) return "";
      return dateStr.split("T")[0];
    };
    document.querySelector("#type_category").value = item.type;
    document.querySelector("#item_category").value = item.category;
    document.querySelector("#amount").value = item.amount;
    document.querySelector("#memo").value = item.memo;
    document.querySelector("#date").value = formatDate(item.create_at);
  };

  const registerAccount = async (e) => {
    e.preventDefault();

    const type  = document.querySelector("#type_category").value;
    const category = document.querySelector("#item_category").value;
    const amount = document.querySelector("#amount").value;
    const memo = document.querySelector("#memo").value;
    const create_at = document.querySelector("#date").value;

    const params = new URLSearchParams(location.search);
    const id = params.get("id");

    let response;
      
    if (id) {
      // 수정
      response = await fetch(`/api/account/${id}`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${localStorage.getItem("myToken")}`
        },
        body: JSON.stringify({ type, category, amount, memo, create_at })
      });
    } else {
      // 등록
      response = await fetch(`/api/account/register`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${localStorage.getItem("myToken")}`
        },
        body: JSON.stringify({ type, category, amount, memo, create_at })
      });
    }

    const data = await response.json();

    if (data.success) {
      location.href = "/index";
    } else {
      console.log("에러", data.message);
    }
  };


  window.addEventListener("DOMContentLoaded", loadAccountData);
</script>
</html>
