<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Index</title>
  <link rel="stylesheet" href="../assets/css/common.css">
</head>
<body>
  <header class="header">
    <div class="back">
      <button type="button" class="btn back"><span class="blind">back</span></button>
    </div>
    <div><span id="userName">user</span>님의 가계부</div>
    <div class="dropdown">
      <button type="button" class="btn btn_dropdown">편집</button>
    </div>
  </header>
  <main>
    <section class="expenses_monthly mb0 pb0">
      <div class="monthly_history">
        <div class="monthly_info">
          <div class="monthly">
            <button type="button" class="prev_month" id="prevMonth">◀</button>
            <span class="month" id="currentMonth">{3}</span>월
            <button type="button" class="next_month" id="nextMonth">▶</button>
          </div>
          <div class="monthly_category">
            <p id="spend_category" class="spend_category">최다 소비 <span class="category">{카테고리}</span></p>
            <p id="spend_history" class="spend_history">이번달 총 소비금액 <span class="spend_data">{금액}</span> 쓰는 중</p>
          </div>
        </div>
        <div class="monthly_chart">
          <canvas id="chart" class="chart"></canvas>
        </div>
      </div>
      <div class="weekly_calender">
        하단 캘린더
      </div>
      <div class="recently_expenses">
        지출내역 3개만
      </div>
      <div class="button">
        <button type="button" class="btn more">내역 더보기</button>
      </div>
    </section>
    <section class="expenses_fixed mt0">
      고정지출내역
      보험
      통신요금
      생활요금
      구독
      기타
    </section>
    <section class="balance">
      남은돈
      수입
      소비
      남은금액
    </section>
    <section class="analysis">

    </section>
  </main>
</body>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js'></script>
<script type="module">
import {checkAuth} from "../assets/js/auth.js";
import {state} from "../assets/js/state.js";
import {common} from "../assets/js/common.js";



  let chartInstance;
const init = async () => {
  const user = await checkAuth();

  if(!user) return; // 인증 정보가 없을 경우 return

  state.user = user; // 인증정보 공통 함수에 저장

  document.querySelector("#userName").textContent = `${user.user_name}`;

  dateState();
  console.log("init 실행"); // init 정상 실행 확인 콘솔
}
init();

const loadData = async() => {
  console.log("loadData 실행");


  const data = await common.dateState(); // 조회 월 설정 데이터 가져온 후 

  if(data.success){ // 데이터 응답 성공시 ui 데이터 조작
    const {MaxCategory, totalSpend} = data.data;
    document.querySelector(".category").textContent = MaxCategory ?? "없음";
    document.querySelector(".spend_data").textContent = totalSpend ?? 0;

  }

  chart();

}

// 조회 월 설정
const dateState = () => {
  const dateState = state.date;
  const renderMonth = () => {
    // 년도 바뀌면
    if (dateState.year === new Date().getFullYear()) {
      document.querySelector("#currentMonth").textContent = dateState.month;
    } else {
      document.querySelector("#currentMonth").textContent =
        dateState.year + "." + dateState.month;
    }

    // 현재 달이면 다음달 클릭 버튼 숨김
    if (dateState.year === new Date().getFullYear() && dateState.month >= new Date().getMonth() + 1) {
      document.querySelector("#nextMonth").style.display = "none";
    } else {
      document.querySelector("#nextMonth").style.display = "inline-block";
    }
  };

  renderMonth();
  loadData();

  // 이전달 버튼 클릭시
  document.querySelector("#prevMonth").addEventListener("click", () => {
    dateState.month--;
    if (dateState.month < 1) {
      dateState.month = 12;
      dateState.year--;
    }
    renderMonth();
    loadData();
  });

  // 다음달 버튼 클릭시
  document.querySelector("#nextMonth").addEventListener("click", () => {
    // 현재달까지만 선택 가능
    if (
      dateState.year === new Date().getFullYear() &&
      dateState.month >= new Date().getMonth() + 1
    ) {
      return;
    }
    dateState.month++;
    if (dateState.month > 12) {
      dateState.month = 1;
      dateState.year++;
    }
    renderMonth();
    loadData();
  });
};

const chart = async () => {
  
  const dateState = state.date;
  // 선택 월의 총 일수 구하기
  const currentMonth = new Date(dateState.year, dateState.month, 0).getDate();

  const data = await common.daySpend();
  const chart = document.querySelector("#chart").getContext("2d");

  // 차트 데이터 
  const chartData = new Array(currentMonth).fill(0); // 차트 데이터 0으로 초기화 (31일 기준으로)
  const labels = Array.from({length : currentMonth}, (_,i) => i + 1);
  data.dayAccount.forEach(v=>{
    // 일자에서 따오는데 1일부터 시작이고 배열은 0부터니까 -1 해줘야 맞음
    const day = new Date(v.day).getDate()-1; 
    console.log("day", day);
    chartData[day] = Number(v.total);
  });

  console.log(labels);
  console.log(chartData)
  // 기존 차트 제거 후 그리기
  if(chartInstance){
    chartInstance.data.labels = labels;
    chartInstance.data.datasets[0].data = chartData;
    chartInstance.update();
    return;
  }

  // 차트 설정 함수
  chartInstance = new Chart(chart, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        data: chartData,
        borderWidth: 1
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          display: false   // legend 숨김
        }
      },
      animation: {
        duration: 300,      // 애니메이션 시간
        easing: 'easeOutQuart'
      },
      scales: {
        x: {
        ticks: {
          autoSkip: false,
          display: false   // x축 텍스트 숨김
        },
        },
        y: {
          beginAtZero: true,
          ticks: {
            display: false
          },
          grid: {
            display: false
          }
        }
      },
      elements: {
        point: {
          radius: 3
        }
      }
    }
  });
}
</script>
</html>
