<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="../assets/css/common.css">
</head>
<body>
  <section class="card login_card">
    <div class="card_wrap">
      <div class="card_title">로그인</div>
      <div class="input_wrap">
        <input type="text" id="input_id" class="input" name="user_id"/>
        <label for="input_id">아이디</label>
      </div>
      <div class="input_wrap">
        <input type="password" id="input_pwd" class="input" name="user_pwd"/>
        <label for="input_pwd">비밀번호</label>
      </div>
      <div class="button_wrap">
        <button type="button" id="btn_login" class="btn" onclick="login()">로그인</button>
      </div>
    </div>
    <div class="auth_links">
      <!-- <a href="#">아이디 찾기</a>
      <a href="#">비밀번호 찾기</a> -->
      <a href="/signup">회원가입</a>
    </div>
  </section>
</body>

<script>
  // 로그인
  const login = async () => {
    const response = await fetch("/api/user/login", {
      method: "post",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user_id: input_id.value, pwd: input_pwd.value})
    });

    const data = await response.json(); // 응답받은 json을 js 객체로 변환하여 data에 저장

    if(data.success) { // data의 성공 여부 메세지가 true일 경우
      localStorage.setItem('myToken', data.token); // 로컬스토리지에 토큰 저장
      location.href = '/index'; // 로그인 성공시 index.html로 이동
    } else {
      alert("로그인 실패");
    }
  }

</script>
</html>
