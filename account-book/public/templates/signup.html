<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up</title>
  <link rel="stylesheet" href="../assets/css/common.css">
</head>
<body>
  <section class="card">
    <div class="card_wrap">
      <div class="card_title">회원가입</div>
      <div class="input_wrap">
        <input type="text" id="input_name" class="input" name="user_name"/>
        <label for="input_name">이름</label>
      </div>
      <div class="input_wrap">
        <div class="flex">
          <input type="text" id="input_id" class="input" name="user_id"/>
          <button type="button" id="input_chk" class="btn" onclick="checkId()">중복확인</button>
        </div>
        <label for="input_id">아이디</label>
      </div>
      <div class="input_wrap">
        <input type="text" id="input_pwd" class="input" name="user_pwd"/>
        <label for="input_pwd">비밀번호</label>
      </div>
      <div class="input_wrap">
        <input type="text" id="input_pwdConfirm" class="input" name="user_pwdConfirm"/>
        <label for="input_pwdConfirm">비밀번호 확인</label>
      </div>
      <div class="input_wrap">
        <input type="date" id="input_birth" class="input" name="user_birth"/>
        <label for="input_birth">생년월일</label>
      </div>
      <div class="input_wrap">
        <input type="text" id="input_tel" class="input" name="user_tel"/>
        <label for="input_tel">전화번호</label>
      </div>
      <div class="button_wrap">
        <button type="button" id="btn_login" class="btn" onclick="signup()">회원가입</button>
      </div>
    </div>
  </section>
</body>
<script>
  // 회원가입 함수
  const signup = async() => {
    // 회원가입에 필요한 입력값 변수 정의
    const user_name = document.getElementById("input_name").value;
    const user_id = document.getElementById("input_id").value;
    const pwd = document.getElementById("input_pwd").value;
    const pwd_confirm = document.getElementById("input_pwdConfirm").value;
    const birth_date = document.getElementById("input_birth").value;
    const tel = document.getElementById("input_tel").value;

    try {
      // 입력한 회원가입 정보를 서버에 보내서 처리
      // 클라이언트(signup.html) -> server.js(was,ws) -> useController -> userServeice -> useModel -> db
      const response = await fetch('/api/user/signup', { // fetch : HTTP 서버에 요청을 보냄
        method: "POST", // post : 회원 정보 서버에 전달
        headers: { "Content-Type": "application/json" }, // 요청 헤더에 JSON 형식의 데이터임을 명시
        body: JSON.stringify({ user_name, user_id, pwd, birth_date, tel }) // 요청 본문에 JSON 형식으로 회원가입 정보를 담아서 보냄
      }); 

      // response.ok : 요청이 정상적으로 성공했는지 알려주는 값
      // throw new Error : 강제로 에러 발생시키는 코드
      if(!response.ok) throw new Error("서버응답실패"); // 서버 응답 200(성공)이 아니면 전부 에러처리
    
      // response 요청이 정상적으로 성공했을 경우
      // /api/user/signup의 JSON 데이터를 가져옴
      const data = await response.json(); // 응답 받은 JSON 데이터를 JS 객체로 변환하여 data 변수에 저장

      if(data.succescc) { // data의 성공 메시지가 true일 경우
        alert(data.message);
        window.loaction.href = "/login"; // 회원가입 성공 후 로그인 페이지로 이동
      } else { // 회원 가입 실패했을 경우
        alert(data.message);
      }

    } catch (error) { // 네트워크 오류 등으로 요청이 실패한 경우
      console.error("Error:", error);
      alert("회원가입 중 오류가 발생했습니다. 다시 시도해주세요.");
      return;
    }
  }

  const check = async () => {
    
  }
</script>
