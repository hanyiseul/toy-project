<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join</title>
  <link rel="stylesheet" href="../assets/css/common.css">
</head>
<body>
  <section class="card">
    <div class="card_wrap">
      <div class="card_title">회원가입</div>
      <div class="input_wrap">
        <input type="text" id="input_id" class="input" name="user_id"/>
        <label for="input_id">이름</label>
      </div>
      <div class="input_wrap">
        <div class="flex">
          <input type="text" id="input_id" class="input" name="user_id"/>
          <button type="button" id="input_chk" class="btn">중복확인</button>
        </div>
        <label for="input_id">아이디</label>
      </div>
      <div class="input_wrap">
        <input type="text" id="input_pwd" class="input" name="user_pwd"/>
        <label for="input_pwd">비밀번호</label>
      </div>
      <div class="input_wrap">
        <input type="text" id="input_pwdConfirm" class="input" name="user_pwdConfirm"/>
        <label for="input_pwdConfirm">비밀번호 확인</label>
      </div>
      <div class="input_wrap">
        <input type="text" id="input_id" class="input" name="user_id"/>
        <label for="input_id">생년월일</label>
      </div>
      <div class="input_wrap">
        <input type="text" id="input_id" class="input" name="user_id"/>
        <label for="input_id">전화번호</label>
      </div>
      <div class="button_wrap">
        <button type="button" id="btn_login" class="btn">회원가입</button>
      </div>
    </div>
  </section>
</body>
</html>
