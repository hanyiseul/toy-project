<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>토익 문제 풀이</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="/assets/css/common.css">
</head>
<body>
  <header>
    <h1>토익문제 시스템</h1>
    <ul class="menuList">
      <li><a href="/">문제풀기</a></li>
      <li><a href="/result">결과보기</a></li>
      <li><a href="/analysis">분석보기</a></li>
      <li><a href="/map">시험장</a></li>
    </ul>
  </header>
    <section>
      <h2>토익 시험장 지도</h2>
      <div id="map"></div>

      <div class="infoTable">
        <h3>토익 시험장 안내 정보</h3>
        <table>
          <thead>
            <tr>
              <th>시험장</th>
              <th>주소</th>
              <th>건물</th>
              <th>좌석</th>
              <th>시험일</th>
            </tr>
          </thead>
          <tbody id="test-table">
          </tbody>
        </table>
      </div>
    </section>  

    <script src="/assets/js/mapdata.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
        // 지도 초기화
        const map = L.map('map').setView([toeicTestCenters[0].lat, toeicTestCenters[0].lng], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        L.marker([toeicTestCenters[0].lat, toeicTestCenters[0].lng])
            .addTo(map)
            .bindPopup(toeicTestCenters[0].name)
            .openPopup();

        // 지도 정보 테이블에 반영하기
        const tableBody = document.getElementById('test-table');

        toeicTestCenters.forEach(item => {            
            const row = document.createElement('tr');
            row.innerHTML = `
              <td>${item.name}</td>
              <td>${item.address}</td>
              <td>${item.examInfo.building}</td>
              <td class="seats">${item.examInfo.seats}석</td>
              <td>${item.examSchedule[0].date}</td>
            `;
            tableBody.appendChild(row);      
            const trs = tableBody.querySelectorAll('tr');
            
            row.addEventListener("click", () => {
              map.setView([item.lat, item.lng], 17);
              L.marker([item.lat, item.lng])
                .addTo(map)
                .bindPopup(item.name)
                .openPopup();
            });
        });
        
        // 남은 좌석 실시간 업데이트 테스트
        let seats = document.querySelectorAll('.seats');

        setInterval(() => {
          seats.forEach(seat => {
            let count = parseInt(seat.textContent); // 석 때문에.. 문자... 숫자로 만들어주기

            if (count > 0) { // 좌석이 남아있을때만 
              count--; // 임시로 좌석수 줄이기
            }
            seat.textContent = `${count}석`;
          })
        }, 1000);
    </script>
</body>
</html>
